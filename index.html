<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - GBP Electro-Mechanical Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind = { config: { corePlugins: { preflight: false } } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="auth-shell relative overflow-hidden">
    <div class="pointer-events-none absolute -left-24 top-16 h-72 w-72 rounded-full bg-blue-200/50 blur-3xl"></div>
    <div class="pointer-events-none absolute -right-20 bottom-12 h-80 w-80 rounded-full bg-sky-300/40 blur-3xl"></div>
    <div class="pointer-events-none absolute left-1/2 top-0 h-px w-2/3 -translate-x-1/2 bg-gradient-to-r from-transparent via-blue-400/70 to-transparent"></div>

    <div class="auth-card auth-card-modern relative z-10">
      <div class="auth-illustration-placeholder" aria-label="Reserved space for a future logo or illustration">Logo / illustration</div>
      <div class="auth-signin-icon">↗</div>
      <div class="auth-intro"><h1>Sign in</h1><p>Welcome back. Enter your details to continue.</p></div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-auth-tab="login">Login</button>
        <button class="auth-tab" data-auth-tab="register">Register</button>
      </div>

      <form id="loginForm" class="auth-form">
        <label class="form-field">
          <span>Email</span>
          <input id="loginEmail" type="email" placeholder="you@example.com" required />
        </label>
        <label class="form-field">
          <span>Password</span>
          <div class="password-control"><input id="loginPassword" type="password" required /><button type="button" id="togglePassword">Show</button></div>
        </label>
        <a class="forgot-link" href="#">Forgot password?</a>
        <button type="submit" class="primary-button w-full">Login</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <label class="form-field">
          <span>Full Name</span>
          <input id="registerName" required />
        </label>
        <label class="form-field">
          <span>Email</span>
          <input id="registerEmail" type="email" required />
        </label>
        <label class="form-field">
          <span>Password</span>
          <input id="registerPassword" type="password" minlength="8" required />
        </label>
        <label class="form-field">
          <span>Phone Number</span>
          <input id="registerPhone" inputmode="numeric" pattern="09[0-9]{9}" maxlength="11" required /><small id="registerPhoneError" class="field-error hidden">Enter a valid 11-digit PH phone number starting with 09.</small>
        </label>
        <label class="form-field">
          <span>House Number</span>
          <input id="registerHouseNumber" required />
        </label>
        <label class="form-field">
          <span>Street</span>
          <input id="registerStreet" required />
        </label>
        <label class="form-field">
          <span>Barangay</span>
          <input id="registerBarangay" required />
        </label>
        <label class="form-field">
          <span>City / Municipality</span>
          <input id="registerCity" required />
        </label>
        <label class="form-field">
          <span>Province</span>
          <input id="registerProvince" required />
        </label>
        <label class="form-field">
          <span>ZIP Code</span>
          <input id="registerZipCode" inputmode="numeric" required />
        </label>
        <button type="submit" class="primary-button w-full">Create Customer Account</button>
      </form>

      <div class="auth-actions">
        <a class="secondary-button w-full" href="guest.html">Browse as Guest</a>
      </div>

    </div>
  </section>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="js/auth-page.js"></script>
</body>
</html>
