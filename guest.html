<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Portal - GBP Electro-Mechanical Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind = { config: { corePlugins: { preflight: false } } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="portal-shell">
    <div class="portal-brand"><div class="brand-logo-frame"><img class="brand-logo-img" src="resources/logo.png" alt="GBP logo" /></div><strong>GBP Electro -Mechanical Services</strong></div>
    <aside class="portal-sidebar">
      <nav class="portal-nav">
        <button class="nav-link active" data-tab="services"><span class="nav-icon icon-service"></span>Services</button>
        <button class="nav-link" data-tab="products"><span class="nav-icon icon-product"></span>Products</button>
      </nav>
    </aside>
    <main class="portal-main">
      <header class="portal-header"><div><h1>Guest Browsing</h1><p>View services and products. Login or register to book a schedule.</p></div><a class="primary-button" href="index.html">Login / Register</a></header>
      <section id="servicesTab" class="portal-tab"><div class="page-heading"><div><h2>Services</h2><p>Browse available services.</p></div></div><section class="panel"><table class="data-table"><thead><tr><th>Name</th><th>Type</th><th>Price</th><th>Inclusion</th><th>Exclusion</th><th>Action</th></tr></thead><tbody id="servicesBody"></tbody></table></section></section>
      <section id="productsTab" class="portal-tab hidden"><div class="page-heading"><div><h2>Products</h2><p>Browse available products.</p></div></div><section id="productsGrid" class="products-grid"></section></section>
    </main>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script type="module" src="js/guest-page.js"></script>
</body>
</html>
